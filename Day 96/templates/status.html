<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Status - F1 Circuits</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .status-card {
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .cache-fresh {
            border-left: 5px solid #28a745;
        }
        .cache-stale {
            border-left: 5px solid #ffc107;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="bi bi-speedometer2 text-danger me-2"></i>
                F1 Circuits Server Status
            </a>
        </div>
    </nav>

    <div class="container">
        <h1 class="mb-4">Server Status</h1>

        <div class="row">
            <div class="col-md-6">
                <div class="status-card {% if cache_age_seconds and cache_age_seconds < 300 %}cache-fresh{% else %}cache-stale{% endif %}">
                    <h4>Cache Information</h4>
                    <table class="table table-borderless text-light">
                        <tr>
                            <th>Circuits in Cache:</th>
                            <td>{{ circuits_count }}</td>
                        </tr>
                        <tr>
                            <th>Last Update:</th>
                            <td>{{ last_update }}</td>
                        </tr>
                        <tr>
                            <th>Cache Age:</th>
                            <td>
                                {% if cache_age_seconds %}
                                    {{ (cache_age_seconds // 60)|int }} minutes
                                {% else %}
                                    N/A
                                {% endif %}
                            </td>
                        </tr>
                    </table>
                </div>
            </div>

            <div class="col-md-6">
                <div class="status-card">
                    <h4>Actions</h4>
                    <div class="d-grid gap-2">
                        <a href="/force-refresh" class="btn btn-primary">
                            Force Refresh Cache
                        </a>
                        <a href="/circuits" class="btn btn-success">
                            View Circuits
                        </a>
                        <a href="/" class="btn btn-outline-light">
                            Go Home
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
